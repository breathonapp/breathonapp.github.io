<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #3b9eff;
    --blue-glow: rgba(59,158,255,0.4);
  }

  html, body {
    height: 100%;
    background: #060a12;
    color: #e8f0ff;
    font-family: "DM Sans", sans-serif;
    overflow: hidden;
  }

  /* Ambient background */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .bg::before {
    content: "";
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(59,158,255,0.12) 0%, transparent 70%);
    animation: pulse 6s ease-in-out infinite;
  }
  .bg::after {
    content: "";
    position: absolute;
    bottom: -10%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(59,158,255,0.06) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite reverse;
  }
  @keyframes pulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.15); opacity: 0.7; }
  }

  /* Stars */
  .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--o); }
  }

  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 2.2rem;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-img {
    width: 100px;
    height: 100px;
    border-radius: 22px;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 28px rgba(59,158,255,0.6));
    object-fit: cover;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    border: 1px solid rgba(59,158,255,0.5);
    border-radius: 26px;
    animation: breathe 4s ease-in-out infinite;
  }
  .ring2 {
    width: 148px; height: 148px;
    border-radius: 32px;
    animation-delay: 0.6s;
    border-color: rgba(59,158,255,0.25);
  }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
  }

  /* Text */
  .app-name {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #fff;
    line-height: 1;
    margin-bottom: 1rem;
    animation: fadeUp 1s ease both;
  }
  .tagline {
    font-size: clamp(0.8rem, 3vw, 0.9rem);
    font-weight: 300;
    color: rgba(200,220,255,0.55);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeUp 1s ease 0.2s both;
  }

  /* CTA Button */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2.2rem;
    background: var(--blue);
    color: #fff;
    text-decoration: none;
    border-radius: 100px;
    font-family: "DM Sans", sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    box-shadow: 0 0 40px var(--blue-glow), 0 4px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: fadeUp 1s ease 0.4s both;
    -webkit-tap-highlight-color: transparent;
  }
  .cta:active { transform: scale(0.97); }
  .cta svg { width: 22px; height: 22px; }
  .cta-sub {
    margin-top: 1.2rem;
    font-size: 0.75rem;
    color: rgba(200,220,255,0.3);
    letter-spacing: 0.08em;
    animation: fadeUp 1s ease 0.6s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .breathe-hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200,220,255,0.2);
    animation: breatheText 4s ease-in-out infinite;
  }
  @keyframes breatheText {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }
</style>
